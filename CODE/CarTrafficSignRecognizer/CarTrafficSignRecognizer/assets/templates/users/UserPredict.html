{% extends 'users/userbase.html' %}
{% load static %}
{% block contents %}

<section class="about full-screen d-lg-flex justify-content-center align-items-center" id="about">
    <div class="container">
        <div class="row">

            <!-- Left section: Upload form + prediction -->
            <div class="col-lg-7 col-md-12 col-12 d-flex flex-column align-items-start">
                
                <!-- Upload form -->
                <form method="post" enctype="multipart/form-data" class="mb-4">
                    {% csrf_token %}
                    <label for="image"><strong>Upload Traffic Sign Image:</strong></label><br>
                    <input type="file" name="image" accept="image/*" required class="form-control mb-3">
                    <button type="submit" class="btn btn-primary">Predict</button>
                </form>

                <!-- Show prediction if available -->
                {% if sign %}
                    <h3>The Traffic Sign is: <span class="text-success">{{ sign }}</span></h3>
                {% endif %}
            </div>

            <!-- Right section: Illustration -->
            <div class="col-lg-5 col-md-12 col-12">
                <div class="about-image svg">
                    <img src="{% static 'images/undraw/undraw_software_engineer_lvl5.svg' %}" class="img-fluid" alt="svg image">
                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
